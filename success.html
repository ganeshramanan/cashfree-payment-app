<!doctype html>
<html>
  <head>
    <title>Payment Success</title>
  </head>
  <body>
    <h1>🎉 Payment Success</h1>

    <p id="order"></p>

    <script>
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get("order_id");

      document.getElementById("order").innerText = "Order ID: " + orderId;
    </script>
  </body>
</html>
